<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toilet Rush — Mini Jeu</title>
    <style>
      :root {
        --bg: #f7c21d;
        --panel: #fff9df;
        --text: #2f2a15;
        --accent: #d32f2f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at 20% 20%, #ffd84d, var(--bg));
        color: var(--text);
      }
      .wrap {
        width: min(92vw, 900px);
        display: grid;
        gap: 12px;
      }
      .hud {
        background: var(--panel);
        border: 3px solid rgba(0,0,0,.15);
        border-radius: 14px;
        padding: 10px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }
      .hud strong { color: var(--accent); }
      canvas {
        width: 100%;
        height: auto;
        border-radius: 16px;
        border: 4px solid rgba(0,0,0,.2);
        background: linear-gradient(#fff7d1, #ffe88c);
        box-shadow: 0 14px 30px rgba(0,0,0,.15);
      }
      .hint {
        text-align: center;
        font-size: .95rem;
        background: rgba(255,255,255,.75);
        border-radius: 10px;
        padding: 8px 12px;
      }
      button {
        border: 0;
        background: #1d7a27;
        color: white;
        padding: 8px 14px;
        border-radius: 999px;
        font-weight: 700;
        cursor: pointer;
      }
      button:hover { filter: brightness(1.06); }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hud">
        <div>🧻 Score: <strong id="score">0</strong></div>
        <div>❤️ Vies: <strong id="lives">3</strong></div>
        <div>⏱️ Temps: <strong id="time">30</strong>s</div>
        <button id="restart">Recommencer</button>
      </section>

      <canvas id="game" width="900" height="500" aria-label="Mini jeu Toilet Rush"></canvas>

      <p class="hint">
        Déplace le distributeur avec <strong>← →</strong> ou <strong>A / D</strong>, attrape les rouleaux 🧻, évite les microbes 🦠.
      </p>
    </main>

    <script>
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const livesEl = document.getElementById('lives');
      const timeEl = document.getElementById('time');
      const restartBtn = document.getElementById('restart');

      const W = canvas.width;
      const H = canvas.height;

      let keys = {};
      let score = 0;
      let lives = 3;
      let timer = 30;
      let lastTime = 0;
      let spawnTick = 0;
      let running = true;

      const player = {
        x: W / 2 - 70,
        y: H - 70,
        w: 140,
        h: 42,
        speed: 520,
      };

      const drops = [];

      function reset() {
        score = 0;
        lives = 3;
        timer = 30;
        running = true;
        drops.length = 0;
        player.x = W / 2 - player.w / 2;
        updateHUD();
      }

      function updateHUD() {
        scoreEl.textContent = score;
        livesEl.textContent = lives;
        timeEl.textContent = Math.max(0, timer).toFixed(0);
      }

      function spawnDrop() {
        const isBad = Math.random() < 0.32;
        drops.push({
          x: Math.random() * (W - 40) + 8,
          y: -40,
          r: 18,
          vy: 180 + Math.random() * 220,
          type: isBad ? 'germ' : 'paper',
        });
      }

      function drawPlayer() {
        ctx.save();
        ctx.fillStyle = '#ffffff';
        ctx.strokeStyle = '#b5b5b5';
        ctx.lineWidth = 3;
        roundRect(ctx, player.x, player.y, player.w, player.h, 13);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#d32f2f';
        ctx.font = 'bold 26px sans-serif';
        ctx.fillText('CWS', player.x + 10, player.y + 29);

        ctx.fillStyle = '#2368b5';
        ctx.font = '18px sans-serif';
        ctx.fillText('BestToiletpaper', player.x + 64, player.y + 29);
        ctx.restore();
      }

      function drawDrop(d) {
        ctx.save();
        ctx.translate(d.x, d.y);
        if (d.type === 'paper') {
          ctx.fillStyle = '#fff';
          ctx.strokeStyle = '#d3d3d3';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.ellipse(0, 0, 16, 20, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = '#ddd';
          ctx.beginPath();
          ctx.ellipse(0, 0, 6, 8, 0, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillStyle = '#4caf50';
          ctx.beginPath();
          ctx.arc(0, 0, d.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#1b5e20';
          for (let i = 0; i < 6; i++) {
            const a = (Math.PI * 2 * i) / 6;
            ctx.beginPath();
            ctx.arc(Math.cos(a) * 10, Math.sin(a) * 10, 3.5, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        ctx.restore();
      }

      function roundRect(c, x, y, w, h, r) {
        c.beginPath();
        c.moveTo(x + r, y);
        c.arcTo(x + w, y, x + w, y + h, r);
        c.arcTo(x + w, y + h, x, y + h, r);
        c.arcTo(x, y + h, x, y, r);
        c.arcTo(x, y, x + w, y, r);
        c.closePath();
      }

      function collide(d) {
        return (
          d.x + d.r > player.x &&
          d.x - d.r < player.x + player.w &&
          d.y + d.r > player.y &&
          d.y - d.r < player.y + player.h
        );
      }

      function update(dt) {
        if (!running) return;

        if (keys.ArrowLeft || keys.a || keys.A) player.x -= player.speed * dt;
        if (keys.ArrowRight || keys.d || keys.D) player.x += player.speed * dt;
        player.x = Math.max(0, Math.min(W - player.w, player.x));

        spawnTick += dt;
        const spawnRate = Math.max(0.25, 0.65 - score * 0.01);
        if (spawnTick > spawnRate) {
          spawnDrop();
          spawnTick = 0;
        }

        for (let i = drops.length - 1; i >= 0; i--) {
          const d = drops[i];
          d.y += d.vy * dt;

          if (collide(d)) {
            if (d.type === 'paper') score += 10;
            else lives -= 1;
            drops.splice(i, 1);
            continue;
          }

          if (d.y - d.r > H) {
            if (d.type === 'paper') lives -= 1;
            drops.splice(i, 1);
          }
        }

        timer -= dt;
        if (timer <= 0 || lives <= 0) running = false;

        updateHUD();
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        for (let i = 0; i < 40; i++) {
          ctx.fillStyle = i % 2 ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.1)';
          ctx.fillRect(i * 24, 0, 10, H);
        }

        drawPlayer();
        drops.forEach(drawDrop);

        if (!running) {
          ctx.fillStyle = 'rgba(0,0,0,.55)';
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'center';
          ctx.font = 'bold 52px sans-serif';
          ctx.fillText('Partie terminée', W / 2, H / 2 - 20);
          ctx.font = '28px sans-serif';
          ctx.fillText(`Score final: ${score}`, W / 2, H / 2 + 34);
          ctx.font = '20px sans-serif';
          ctx.fillText('Clique sur "Recommencer" pour rejouer', W / 2, H / 2 + 72);
          ctx.textAlign = 'start';
        }
      }

      function loop(ts) {
        const dt = Math.min(0.033, (ts - lastTime) / 1000 || 0);
        lastTime = ts;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      window.addEventListener('keydown', (e) => { keys[e.key] = true; });
      window.addEventListener('keyup', (e) => { keys[e.key] = false; });
      restartBtn.addEventListener('click', reset);

      reset();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
